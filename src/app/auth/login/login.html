<div class="login-container">
    <mat-card class="login-card">

        <mat-card-header>
            <mat-card-title>Iniciar Sesión</mat-card-title>
            <mat-card-subtitle>Ingresa tus credenciales para continuar</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="form" (ngSubmit)="onSubmit()">

                <div class="alert error" *ngIf="errorMessage">
                    <mat-icon>error_outline</mat-icon>
                    <span>{{ errorMessage }}</span>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Usuario</mat-label>
                    <mat-icon matPrefix>person</mat-icon>
                    <input matInput formControlName="username" placeholder="Tu nombre de usuario"
                        autocomplete="username" />
                    <mat-error *ngIf="isFieldInvalid('username')">{{ getFieldError('username') }}</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <mat-icon matPrefix>lock</mat-icon>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
                        autocomplete="current-password" />
                    <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="isFieldInvalid('password')">{{ getFieldError('password') }}</mat-error>
                </mat-form-field>

                <div class="forgot-link">
                    <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button mat-raised-button color="primary" type="submit" class="full-width submit-btn"
                    [disabled]="isLoading">
                    <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
                    <span *ngIf="!isLoading">Ingresar</span>
                </button>

            </form>
        </mat-card-content>

        <mat-card-actions>
            <p class="register-link">
                ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate aquí</a>
            </p>
        </mat-card-actions>

    </mat-card>
</div>
